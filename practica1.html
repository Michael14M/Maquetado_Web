<!DOCTYPE html>

<!--No es una etiqueta técnica, sino una declaración. Le dice al navegador: "Oye, este documento es HTML5". Sin esto, el navegador podría intentar renderizar la página en un modo antiguo ("quirks mode"), lo que causaría que el diseño se vea mal.-->


<html lang="en">
    <!-- Es la raíz de todo el documento. Todo lo que escribas debe estar dentro de esta etiqueta.El atributo lang="en" le indica a los motores de búsqueda (como Google) y a los lectores de pantalla que el contenido principal está en inglés. Si vas a escribir en español, deberías cambiarlo a lang="es". -->

<head>
    <!--  Esta sección contiene la metainformación. Es decir, datos sobre la página que no se ven directamente en la pantalla, pero que son cruciales para que funcione correctamente. -->

    <meta charset="UTF-8">
    <!-- Especifica la codificación de caracteres. UTF-8 permite que se reconozcan correctamente tildes, la letra "ñ" y símbolos especiales. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Esta es vital para el diseño responsivo. Hace que tu web se vea bien en celulares al ajustar el ancho del sitio al ancho de la pantalla del dispositivo. -->

    <title>Document</title> 
    <!-- Es el nombre que aparece en la pestaña del navegador. También es lo primero que ve un usuario en los resultados de Google. -->

</head>
<body>

    <a href="practica8.html">volver</a>

</body>
</html>
