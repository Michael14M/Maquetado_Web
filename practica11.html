<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqueta table se utiliza para definir tablas de HTML. Todo el contenido de la tabla incluidas las filas y las celdas, se coloca dentro de esta etiqueta -->

    <!-- La etiqueta tr se utiliza para definiruna fila en una tabla. Cada fila puede contener una o mas celdas, que se definen utilizando las etiquetas td (para celdas de datos) o th (para celdas de encabezados) -->

    <!-- La etiqueta td define una celda de datos dentro de una fila. Cada etiqueta td representa una columna en la tabla -->

    <!-- La etiqueta th define una celda de encabezado dentro de uan fila. Cada etiqueta th representa un encabezado de columna en la tabla -->

    <table border="3"> <!-- Etiqueta de apertura-->
        <tr> <!-- Fila 1-->
            <th>Encabezado 1</th>
            <th>Encabezado 2</th> 
            <th>Encabezado 3</th>
        </tr>
        <tr> <!-- Fila 2-->
            <td>Dato 1</td>
            <td>Dato 2</td>
            <td>Dato 3</td>
        </tr>
        <tr> <!-- Fila 3-->
            <td>Dato 4</td>
            <td>Dato 5</td>
            <td>Dato 6</td>
        </tr>

    
    </table> <!-- Etiqueta de cierre -->
    <table border="1">
        <caption>Paises y Capitales</caption>
        <tr>
            <th>Pais</th>
            <th>Capital</th>
        </tr>
        <tr>
            <td>España</td>
            <td>Madrid</td>
        </tr>
        <tr>
            <td>Francia</td>
            <td>Paris</td>
        </tr>
        <tr>
            <td>Italia</td>
            <td>Roma</td>
        </tr>
    </table>

    <br>

    <table border="1">
        <tr>
            <th colspan="2">Mundial de Fubol</th>
        </tr>
        <tr>
            <td rowspan="3">Paises con mayoria de goles</td>
            <td>Brasil 2</td> <td>230</td>
        </tr>
        <tr>
            <td>Alemania</td> <td>180</td>
        </tr>
        <tr>
            <td>Argentina</td> <td>150</td>
        </tr>
    </table>
</body>
</html>
